<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Media Downloader{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <style>
        /* Lucide Icons Style */
        .icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand-block">
                    <button class="mobile-menu-btn" type="button" onclick="toggleSidebar()" title="切换导航">
                        <svg class="icon" viewBox="0 0 24 24">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <span class="brand-mark">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z"></path>
                        </svg>
                    </span>
                    <div>
                        <div class="brand-title">Telegram Media Sync</div>
                        <div class="brand-subtitle">媒体下载、WebDAV 同步与任务控制台</div>
                    </div>
                </div>

                <div class="topbar-actions">
                    <div class="topbar-pill">
                        <span class="status-dot"></span>
                        <span>实时任务流</span>
                    </div>
                    <div class="topbar-pill">
                        <span>v<span id="app-version">...</span></span>
                    </div>
                    <button id="theme-toggle" class="icon-button" onclick="toggleTheme()" title="切换明暗模式">
                        <svg class="icon" viewBox="0 0 24 24" id="icon-moon">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <svg class="icon hidden" viewBox="0 0 24 24" id="icon-sun">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="shell-body">
            <aside class="sidebar" id="sidebar">
                <nav class="side-nav">
                    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>任务仪表盘</span>
                    </a>
                    <a href="{{ url_for('config') }}"
                        class="nav-link {% if request.endpoint == 'config' %}active{% endif %}">
                        <svg class="icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 10v6m11-11h-6M7 12H1m18.4-7.4-4.2 4.2M8.8 15.2l-4.2 4.2m14.8 0-4.2-4.2M8.8 8.8 4.6 4.6"></path>
                        </svg>
                        <span>同步设置</span>
                    </a>
                    <a href="{{ url_for('tg_login') }}"
                        class="nav-link {% if request.endpoint == 'tg_login' %}active{% endif %}">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M21.5 2.5 2 10l8 3 3 8 8.5-18.5z"></path>
                            <path d="m10 13 4-4"></path>
                        </svg>
                        <span>Telegram 账号</span>
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <div class="sidebar-status">
                        <span class="status-dot"></span>
                        <div>
                            <div class="sidebar-status-title">运行中</div>
                            <div class="sidebar-status-subtitle">Postgres + Telegram runtime</div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Inline script to prevent flash of wrong theme
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                document.body.classList.add('light-mode');
                updateThemeIcon(true);
            } else {
                updateThemeIcon(false);
            }
        })();

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon(isLight);
        }

        function updateThemeIcon(isLight) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            // const text = document.getElementById('theme-text');

            if (isLight) {
                moon.classList.add('hidden');
                sun.classList.remove('hidden');
                // text.textContent = '日间模式';
            } else {
                moon.classList.remove('hidden');
                sun.classList.add('hidden');
                // text.textContent = '夜间模式';
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) sidebar.classList.toggle('active');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
