{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1>设置</h1>
            <p>配置机器人行为。更改需要重启应用。</p>
        </div>
        <div class="flex gap-2">
            <button onclick="restartApp()" class="btn btn-danger">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                重启应用
            </button>
            <form action="/clear_config_cache" method="post" onsubmit="return confirm('确定重置所有设置到默认/本地？')">
                <button type="submit" class="btn btn-outline">清除缓存</button>
            </form>
            <a href="/export_data" class="btn btn-outline">导出数据</a>
            <button type="button" onclick="document.getElementById('importFile').click()" class="btn btn-outline">导入数据</button>
            <input type="file" id="importFile" onchange="importData(this)" style="display: none;" accept=".json">
        </div>
    </div>

    <!-- View Toggles - Renamed function to avoid app.js conflict -->
    <div class="flex gap-1 mb-4 border-b border-border">
        <button class="nav-link active" id="tab-basic" onclick="switchConfigTab('basic')">基础设置</button>
        <button class="nav-link" id="tab-chats" onclick="switchConfigTab('chats')">监控会话</button>
        <button class="nav-link" id="tab-advanced" onclick="switchConfigTab('advanced')">高级 / JSON</button>
    </div>

    <div class="card relative">
        <form id="configForm">
            <textarea name="config" id="configArea" class="hidden">{{ config }}</textarea>

            <!-- Basic Tab -->
            <div id="view-basic" class="tab-content">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><h3 class="mb-3 border-b border-border pb-2 text-accent">Telegram API</h3></div>
                    <div><label class="block text-sm text-secondary mb-1">API ID</label><input type="text" data-path="api_id" class="input"></div>
                    <div><label class="block text-sm text-secondary mb-1">API Hash</label><input type="password" data-path="api_hash" class="input toggle-pw"></div>
                    <div><label class="block text-sm text-secondary mb-1">Bot Token</label><input type="password" data-path="bot_token" class="input toggle-pw"></div>

                    <div class="col-span-2 mt-4"><h3 class="mb-3 border-b border-border pb-2 text-accent">应用设置</h3></div>
                    <div class="col-span-2"><label class="block text-sm text-secondary mb-1">下载保存路径</label><input type="text" data-path="save_path" class="input"></div>
                    <div><label class="block text-sm text-secondary mb-1">最大并发下载数</label><input type="number" data-path="max_concurrent_transmissions" class="input"></div>
                    <div><label class="block text-sm text-secondary mb-1">语言</label>
                        <select data-path="language" class="input"><option value="EN">English</option><option value="CN">Chinese (简体中文)</option></select>
                    </div>
                    <div><label class="block text-sm text-secondary mb-1">Web 登录密码</label><input type="password" data-path="web_login_secret" id="web_login_secret_input" class="input toggle-pw"></div>

                    <div class="col-span-2 mt-4">
                        <label class="flex justify-between items-center mb-3 border-b border-border pb-2">
                            <h3 class="text-accent m-0">云盘上传</h3>
                            <input type="checkbox" id="enable_upload_file">
                        </label>
                        <div id="cloud-drive-settings" class="grid grid-cols-2 gap-4 hidden">
                            <div><label class="block text-sm text-secondary mb-1">适配器</label><select id="upload_adapter" class="input"><option value="rclone">Rclone</option><option value="aligo">Aligo</option><option value="webdav">WebDAV</option></select></div>
                            <div class="col-span-2"><label class="block text-sm text-secondary mb-1">远程目录</label><input type="text" id="remote_dir" class="input"></div>
                            <div class="col-span-2" data-adapter="webdav"><label class="block text-sm text-secondary mb-1">WebDAV URL</label><input type="text" id="webdav_url" class="input"></div>
                            <div data-adapter="webdav"><label class="block text-sm text-secondary mb-1">用户名</label><input type="text" id="webdav_username" class="input"></div>
                            <div data-adapter="webdav"><label class="block text-sm text-secondary mb-1">密码</label><input type="password" id="webdav_password" class="input toggle-pw"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chats Tab -->
            <div id="view-chats" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4"><h3>监控会话</h3><button type="button" onclick="addChat()" class="btn btn-outline btn-sm">+ 添加</button></div>
                <table class="table"><tbody id="chats-tbody"></tbody></table>
            </div>

            <!-- Advanced Tab -->
            <div id="view-advanced" class="tab-content hidden">
                <div id="json-editor" class="code-editor" style="height: 400px; width: 100%; border: 1px solid var(--border); padding: 1rem; overflow: auto; white-space: pre;" contenteditable="true"></div>
            </div>

            <div class="flex justify-end mt-6 pt-4 border-t border-border sticky bottom-0 bg-card z-10">
                <button type="button" onclick="saveConfig()" class="btn btn-primary">保存更改</button>
            </div>
        </form>
    </div>
</div>

<script>
    let configData = {};
    const mediaTypesFull = ['audio', 'photo', 'video', 'document', 'voice', 'video_note'];

    function switchConfigTab(tab) {
        console.log("Switching to tab:", tab);
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        const btn = document.getElementById('tab-' + tab);
        if (btn) btn.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        const content = document.getElementById('view-' + tab);
        if (content) content.classList.remove('hidden');

        if (tab === 'advanced') renderJSONEditor();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        try {
            configData = JSON.parse(document.getElementById('configArea').value);
            renderBasicForm();
            renderChats();
        } catch (e) { console.error(e); }
        
        // Ensure switchConfigTab is global
        window.switchConfigTab = switchConfigTab;
    });

    function renderJSONEditor() {
        document.getElementById('json-editor').innerText = JSON.stringify(configData, null, 2);
    }

    function renderChats() {
        const tbody = document.getElementById('chats-tbody');
        tbody.innerHTML = '';
        (configData.chat || []).forEach((chat, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><input type="text" class="input" value="${chat.chat_id}" onchange="configData.chat[${i}].chat_id=this.value"></td>
                            <td><button type="button" onclick="configData.chat.splice(${i},1);renderChats()">删除</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function addChat() {
        if(!configData.chat) configData.chat = [];
        configData.chat.push({chat_id: "", last_read_message_id: 0});
        renderChats();
    }

    function renderBasicForm() {
        document.querySelectorAll('input[data-path]').forEach(input => {
            const val = configData[input.dataset.path];
            if (val !== undefined) input.value = val;
            input.onchange = () => { configData[input.dataset.path] = input.value; };
        });
    }

    function saveConfig() {
        const formData = new FormData();
        formData.append('config', JSON.stringify(configData));
        fetch('/config', { method: 'POST', body: formData }).then(r => r.json()).then(d => alert(d.message));
    }

    function restartApp() { fetch('/restart', {method:'POST'}).then(r=>r.json()).then(d=>alert(d.message)); }
    
    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const formData = new FormData();
            formData.append('file', input.files[0]);
            fetch('/import_data', {method:'POST', body:formData}).then(r=>r.json()).then(d=>{alert(d.message); location.reload();});
        };
        reader.readAsText(input.files[0]);
    }
</script>
{% endblock %}
