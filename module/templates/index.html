{% extends "base.html" %}

{% block content %}
<div id="dashboard-view" class="h-full flex flex-col animate-fade-in">
  <!-- Header Section -->
  <div class="page-heading flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
      <div class="eyebrow">Sync Command Center</div>
      <h1 class="text-2xl font-bold mb-1">任务仪表盘</h1>
      <p class="text-secondary opacity-70">Telegram 媒体传输、WebDAV 上传与归档文件状态</p>
    </div>
    <div id="db-status" class="flex items-center gap-2 px-4 py-2 rounded-lg glass-container text-sm">
      <span id="db-status-dot" class="w-2 h-2 rounded-full bg-secondary"></span>
      <span>数据库: <span id="db-status-text">检查中...</span></span>
    </div>
  </div>

  <div class="dashboard-metrics mb-6">
    <div class="metric-card">
      <div class="metric-icon metric-indigo">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </div>
      <div>
        <div class="metric-label">传输队列</div>
        <div class="metric-value" id="stat-active-total">0</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-emerald">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"></path></svg>
      </div>
      <div>
        <div class="metric-label">归档文件</div>
        <div class="metric-value" id="stat-history-total">0</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-sky">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
      </div>
      <div>
        <div class="metric-label">下载速度</div>
        <div class="metric-value metric-speed" id="stat-download-speed">0 B/s</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-amber">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 21V9"></path><path d="m7 14 5-5 5 5"></path><path d="M5 3h14"></path></svg>
      </div>
      <div>
        <div class="metric-label">上传速度</div>
        <div class="metric-value metric-speed" id="stat-upload-speed">0 B/s</div>
      </div>
    </div>
  </div>

  <!-- Tabs Navigation & Filters -->
  <div class="flex flex-col md:flex-row items-center justify-between mb-6 gap-4">
    <!-- Left: Segmented Tabs -->
    <div class="inline-flex p-1 glass-container rounded-xl">
      <button class="tab-btn active px-6 py-2.5 rounded-lg text-sm font-medium" onclick="switchTab('active')">
        <div class="tab-btn-bg"></div>
        <div class="tab-btn-border"></div>
        <span
          class="relative z-10 flex items-center gap-2 group-[.active]:text-accent text-secondary group-hover:text-text transition-colors">
          传输队列
          <span id="active-count" class="badge-soft badge-accent-soft">0</span>
        </span>
      </button>

      <button class="tab-btn px-6 py-2.5 rounded-lg text-sm font-medium" data-theme="neutral"
        onclick="switchTab('history')">
        <div class="tab-btn-bg"></div>
        <div class="tab-btn-border"></div>
        <span
          class="relative z-10 flex items-center gap-2 group-[.active]:text-text text-secondary group-hover:text-text transition-colors">
          归档文件
          <span id="history-count" class="badge-soft badge-secondary-soft">0</span>
        </span>
      </button>
    </div>

    <!-- Right: Filters -->
    <div id="filter-toolbar"
      class="flex items-center gap-1 p-1 bg-surface/50 rounded-lg border border-transparent hover:border-border transition-colors">
      <button class="filter-chip active px-4 py-1.5 rounded-md" onclick="filterType('all')">
        <div class="active-bg rounded-md"></div>
        <span class="relative z-10">全部</span>
      </button>
      <button class="filter-chip px-3 py-1.5 rounded-md" onclick="filterType('video')">
        <div class="active-bg rounded-md"></div>
        <span class="relative z-10">🎬 视频</span>
      </button>
      <button class="filter-chip px-3 py-1.5 rounded-md" onclick="filterType('image')">
        <div class="active-bg rounded-md"></div>
        <span class="relative z-10">🖼️ 图片</span>
      </button>
      <button class="filter-chip px-3 py-1.5 rounded-md" onclick="filterType('audio')">
        <div class="active-bg rounded-md"></div>
        <span class="relative z-10">🎵 音频</span>
      </button>
      <button class="filter-chip px-3 py-1.5 rounded-md" onclick="filterType('other')">
        <div class="active-bg rounded-md"></div>
        <span class="relative z-10">📄 其他</span>
      </button>
    </div>
  </div>

  <!-- Task Lists Container -->
  <div class="sync-panel flex-1 overflow-hidden relative rounded-xl border border-border shadow-lg bg-card/50 backdrop-blur-sm">

    <!-- Active Tasks Tab (Downloading + Uploading merged) -->
    <div id="tab-active" class="tab-content h-full flex flex-col">
      <div class="table-container flex-1 overflow-auto">
        <table class="table w-full relative">
          <thead
            class="sticky top-0 bg-surface z-10 shadow-sm text-xs uppercase tracking-wider text-secondary font-semibold">
            <tr>
              <th width="60" class="text-center">类型</th>
              <th width="80">来源ID</th>
              <th width="30%">文件名</th>
              <th width="100">大小</th>
              <th width="160">创建时间</th>
              <th>下载进度</th>
              <th>上传进度</th>
              <th width="100">速度</th>
              <th width="120" class="text-right px-4">操作</th>
            </tr>
          </thead>
          <tbody id="active-tbody">
            <!-- JS Populated -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- History Tab -->
    <div id="tab-history" class="tab-content hidden h-full flex flex-col">
      <!-- Header with Clear Button -->
      <div class="flex justify-end p-2 border-b border-border/30">
        <button id="clear-history-btn" onclick="clearHistory()"
          class="btn btn-outline text-xs px-3 py-1.5 flex items-center gap-1.5 hover:bg-danger/10 hover:text-danger hover:border-danger transition-colors">
          <svg class="icon" style="width:14px;height:14px;" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          清空历史
        </button>
      </div>
      <div class="table-container flex-1 overflow-auto">
        <table class="table w-full relative">
          <thead
            class="sticky top-0 bg-surface z-10 shadow-sm text-xs uppercase tracking-wider text-secondary font-semibold">
            <tr>
              <th width="60" class="text-center">类型</th>
              <th width="80">ID/数量</th>
              <th width="30%">名称</th>
              <th width="100">大小</th>
              <th width="140">最新完成</th>
              <th>远程路径</th>
              <th width="60" class="text-center">操作</th>
            </tr>
          </thead>
          <tbody id="downloaded-tbody">
            <!-- JS Populated -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Database heartbeat status check
  async function checkDbStatus() {
    try {
      const res = await fetch('/get_db_status');
      const data = await res.json();
      const dot = document.getElementById('db-status-dot');
      const text = document.getElementById('db-status-text');
      
      if (data.status === 'ok') {
        dot.className = 'w-2 h-2 rounded-full bg-success animate-pulse';
        text.textContent = '正常';
        text.className = 'text-success';
      } else {
        dot.className = 'w-2 h-2 rounded-full bg-danger';
        text.textContent = '异常';
        text.className = 'text-danger';
      }
    } catch (e) {
      const dot = document.getElementById('db-status-dot');
      const text = document.getElementById('db-status-text');
      dot.className = 'w-2 h-2 rounded-full bg-danger';
      text.textContent = '离线';
      text.className = 'text-danger';
    }
  }

  // Check immediately and every 30 seconds
  checkDbStatus();
  setInterval(checkDbStatus, 30000);
</script>
{% endblock %}
